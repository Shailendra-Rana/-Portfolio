<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Shailendra Sunil Rana - Portfolio</title>
    <script type="text/javascript">
      // GitHub Pages SPA redirect hack.
      // Stores the full URL in sessionStorage and redirects to the base path
      // so the React Router can pick it up on load.
      var segmentCount = 1; // number of path segments in the repo name (/Portfolio)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
